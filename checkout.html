<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | AtriaPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#fff;color:#1e2a3e;line-height:1.5}
    .container{max-width:960px;margin:0 auto;padding:24px}
    .header{padding:16px 0;border-bottom:1px solid #eef2f6;position:sticky;top:0;background:#fff;z-index:10}
    .logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#0b3b5f 0%,#1e6f9f 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .title{font-size:1.8rem;font-weight:800;margin:16px 0;color:#0b2b3b}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.05);padding:20px;margin-bottom:20px}
    .form-row{display:flex;gap:16px;flex-wrap:wrap}
    .form-group{flex:1;min-width:220px}
    label{display:block;font-weight:600;margin-bottom:8px}
    .input,.select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #cbd5e1;font-size:1rem;outline:none;transition:border-color .2s, box-shadow .2s}
    .input:focus,.select:focus{border-color:#0b5e7e;box-shadow:0 0 0 3px rgba(11,94,126,0.15)}
    .btn{display:inline-block;background:#0b5e7e;color:#fff;padding:12px 24px;border-radius:40px;font-weight:700;text-decoration:none;border:none;cursor:pointer}
    .result{display:none;margin-top:12px}
    .qr{display:flex;justify-content:center;margin:12px 0}
    .code{word-break:break-all;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px;padding:12px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}
    .note{color:#5a6e84;font-size:.95rem;margin-top:8px}
    @media (max-width:480px){.title{font-size:1.5rem}}
  </style>
  <meta name="robots" content="noindex">
  <meta name="referrer" content="same-origin">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">Atria<span style="color:#0b5e7e;">Pay</span></div>
    </div>
  </header>
  <main class="container">
    <h1 class="title">Checkout</h1>
    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label for="amount">Valor</label>
          <input id="amount" class="input" type="text" placeholder="R$ 0,00" inputmode="decimal" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="method">Método</label>
          <select id="method" class="select">
            <option value="pix">PIX</option>
            <option value="boleto">Boleto</option>
          </select>
        </div>
        <div class="form-group">
          <label for="email">E-mail do pagador</label>
          <input id="email" class="input" type="email" placeholder="pagador@exemplo.com" autocomplete="email">
        </div>
      </div>
      <div style="margin-top:16px">
        <button id="btnPagar" class="btn">Pagar</button>
      </div>
      <div id="result" class="result">
        <div id="pixBox" style="display:none">
          <div class="qr"><img id="qrImg" alt="QR Code" /></div>
          <div class="code" id="qrCode"></div>
          <div class="note">Escaneie o QR Code ou copie o código PIX para pagar.</div>
        </div>
        <div id="boletoBox" style="display:none">
          <a id="boletoLink" class="btn" href="#" target="_blank" rel="noopener">Abrir boleto</a>
          <div class="note">O boleto expira conforme regras do emissor.</div>
        </div>
      </div>
    </div>
  </main>
  <script>
    var nf = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
    function parseValor(v){if(!v)return 0;var s=String(v).replace(/\s/g,'').replace(/\./g,'').replace(',', '.').replace(/[^\d.]/g,'');var n=parseFloat(s);return isNaN(n)||n<0?0:n;}
    var amountEl=document.getElementById('amount');
    var methodEl=document.getElementById('method');
    var emailEl=document.getElementById('email');
    var btn=document.getElementById('btnPagar');
    var result=document.getElementById('result');
    var pixBox=document.getElementById('pixBox');
    var boletoBox=document.getElementById('boletoBox');
    var qrImg=document.getElementById('qrImg');
    var qrCode=document.getElementById('qrCode');
    var boletoLink=document.getElementById('boletoLink');
    function formatOnBlur(){var v=parseValor(amountEl.value);amountEl.value=v?nf.format(v):'';}
    amountEl.addEventListener('blur',formatOnBlur);
    btn.addEventListener('click',async function(){
      var v=parseValor(amountEl.value);
      var m=methodEl.value;
      var e=(emailEl.value||'').trim();
      if(!v||!e){alert('Informe valor e e-mail do pagador');return;}
      btn.disabled=true;btn.textContent='Processando...';
      try{
        var r=await fetch('/api/charges',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          merchant_id:'demo-merchant',
          amount:v,
          currency:'BRL',
          method:m,
          provider:'mercadopago',
          checkout_mode:'direct',
          payer:{email:e}
        })});
        var json=await r.json();
        result.style.display='block';
        pixBox.style.display='none';
        boletoBox.style.display='none';
        if(json.checkout && m==='pix'){
          var b64=json.checkout.qr_code_base64;
          var code=json.checkout.qr_code;
          if(b64){qrImg.src='data:image/png;base64,'+b64;qrImg.style.display='block';}else{qrImg.style.display='none';}
          qrCode.textContent=code||'';
          pixBox.style.display='block';
        }else if(json.checkout && m==='boleto'){
          if(json.checkout.ticket_url){boletoLink.href=json.checkout.ticket_url;}else{boletoLink.removeAttribute('href');}
          boletoBox.style.display='block';
        }else if(json.checkout_url){
          window.location.href=json.checkout_url;
        }else{
          alert('Não foi possível iniciar o pagamento.');
        }
      }catch(err){
        alert('Erro ao processar: '+err);
      }finally{
        btn.disabled=false;btn.textContent='Pagar';
      }
    });
  </script>
  </body>
  </html>
